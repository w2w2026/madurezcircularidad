// ── RADAR ─────────────────────────────────────────────────────
function Radar({scores}) {
  const cx=170,cy=170,r=120,n=DIMS.length;
  const ang=i=>(Math.PI*2*i)/n-Math.PI/2;
  const pt=(v,i)=>[cx+v*Math.cos(ang(i)),cy+v*Math.sin(ang(i))];
  const poly=vals=>DIMS.map((_,i)=>pt((vals[i]/100)*r,i)).map(([x,y])=>`${x},${y}`).join(" ");
  return (
    <svg width={340} height={340} viewBox="0 0 340 340">
      {[20,40,60,80,100].map(p=><polygon key={p} points={poly(DIMS.map(()=>p))} fill="none" stroke={P.border} strokeWidth={1}/>)}
      {DIMS.map((_,i)=><line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(ang(i))} y2={cy+r*Math.sin(ang(i))} stroke={P.border} strokeWidth={1}/>)}
      <polygon points={poly(DIMS.map(d=>scores[d.id]||0))} fill={P.teal+"30"} stroke={P.teal} strokeWidth={2.5}/>
      {DIMS.map((d,i)=>{const[x,y]=pt((scores[d.id]||0)/100*r,i);return <circle key={i} cx={x} cy={y} r={5} fill={d.color} stroke={P.white} strokeWidth={2}/>;} )}
      {DIMS.map((d,i)=>{const[x,y]=pt(r+18,i);return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize={11} fontWeight={700} fill={d.color}>{d.icon}</text>;})}
    </svg>
  );
}

            <div style={{...css.card,borderLeft:`5px solid ${DIMS.find(d=>d.id===page)?.color}`,padding:"20px 24px",marginBottom:16}}>
              <div style={{fontSize:24,marginBottom:4}}>{DIMS.find(d=>d.id===page)?.icon}</div>
              <div style={{...css.secLbl,color:DIMS.find(d=>d.id===page)?.color}}>Dimensión {["diseno","materiales","energia","modelos","cadena","cultura"].indexOf(page)+1} de 6</div>
              <h2 style={{...css.h1,fontSize:20}}>{DIMS.find(d=>d.id===page)?.name}</h2>
              <p style={{fontSize:13,color:P.txt2,lineHeight:1.6,margin:0}}>{DDESC[page]}</p>
            </div>
            {dimQs.map((q,i)=><QCard key={q.id} q={q} val={ans[q.id]} onChange={v=>setAns(a=>({...a,[q.id]:v}))} idx={qOffset()+i+1}/>)}
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:28}}>
              <button onClick={()=>setPage(PAGES[step-1])} style={css.btnO}>← Anterior</button>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {!dimDone&&<span style={{fontSize:12,color:P.warn}}>Responde todas las preguntas</span>}
                <button onClick={()=>dimDone&&setPage(PAGES[step+1])} style={{...css.btn,opacity:dimDone?1:.45}}>Siguiente →</button>
              </div>
            </div>
          </div>
        )}

        {page==="assets"&&(
          <div>
            <div style={{...css.card,borderLeft:`5px solid ${P.teal}`,padding:"20px 24px",marginBottom:16}}>
              <div style={{fontSize:24,marginBottom:4}}>💎</div>
              <div style={css.secLbl}>Sección Final</div>
              <h2 style={{...css.h1,fontSize:20}}>Identificación de Activos Circulares</h2>
              <p style={{fontSize:13,color:P.txt2,lineHeight:1.6,margin:0}}>Identifica activos y capacidades que podrían crear valor bajo modelos de economía circular.</p>
            </div>
            {AQS.map((q,i)=>(
              <div key={q.id} style={{...css.card,padding:20,marginBottom:12,borderLeft:`4px solid ${P.teal}`}}>
                <p style={{fontSize:14,fontWeight:600,color:P.dark,marginBottom:q.tip?3:12,lineHeight:1.5}}>{i+1}. {q.text}</p>
                {q.tip&&<p style={{fontSize:12,color:P.txt2,marginBottom:12,fontStyle:"italic"}}>💡 {q.tip}</p>}
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {AOPTS.map((o,j)=>(
                    <label key={j} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 11px",borderRadius:8,
                      border:`1.5px solid ${aAns[q.id]===j?P.teal:P.border}`,
                      background:aAns[q.id]===j?P.teal+"18":P.bg,cursor:"pointer"}}>
                      <input type="radio" name={q.id} checked={aAns[q.id]===j} onChange={()=>setAAns(a=>({...a,[q.id]:j}))}
                        style={{accentColor:P.teal,flexShrink:0}}/>
                      <span style={{fontSize:13,color:P.txt}}>{o}</span>
                    </label>
                  ))}
                </div>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:28}}>
              <button onClick={()=>setPage(PAGES[step-1])} style={css.btnO}>← Anterior</button>
              <button onClick={()=>setPage("results")} style={css.btnT}>Ver Resultados →</button>
            </div>
          </div>
        )}

        {page==="results"&&<Results ans={ans} aAns={aAns} co={co} onRestart={()=>{setPage("form");setAns({});setAAns({});setCo(null);}}/>}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
